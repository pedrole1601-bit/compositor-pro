<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compositor Pro v2 - Telao</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #compositor-root {
            position: absolute;
            width: 1920px;
            height: 1080px;
            transform-origin: top left;
            overflow: hidden;
        }

        .frame {
            position: absolute;
            overflow: hidden;
        }

        .frame img,
        .frame video {
            display: block;
            width: 100%;
            height: 100%;
        }

        .frame iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }

        .frame-clock,
        .frame-counter,
        .frame-text {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-variant-numeric: tabular-nums;
            overflow: hidden;
            word-break: break-word;
        }

        .debug-overlay {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            z-index: 99999;
            display: none;
            color: #0f0;
            line-height: 1.6;
        }

        .debug-overlay.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div id="compositor-root"></div>
    <div id="debug-overlay" class="debug-overlay">
        <div>WS: <span id="dbg-status">-</span></div>
        <div>Cena: <span id="dbg-scene">-</span></div>
        <div>Frames: <span id="dbg-frames">0</span></div>
        <div>Scale: <span id="dbg-scale">1</span></div>
    </div>
    <script type="module" src="/src/telao/main.ts"></script>
</body>

</html>
